services:
  mongodb:
    image: mongo:6.0
    container_name: matlabx-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: netlabx123
      MONGO_INITDB_DATABASE: netlabx
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
      - ./scripts/mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js:ro
    networks:
      - netlabx-network

  redis:
    image: redis:7-alpine
    container_name: matlabx-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - netlabx-network

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: matlabx-backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 5000
      MONGODB_URI: mongodb://admin:netlabx123@mongodb:27017/netlabx?authSource=admin
      REDIS_URL: redis://redis:6379
      JWT_SECRET: your_super_secret_jwt_key_change_in_production
      FRONTEND_URL: http://localhost:3000
    ports:
      - "5000:5000"
    volumes:
      - ./logs:/app/logs
      - ./configs:/app/configs
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      - mongodb
      - redis
    networks:
      - netlabx-network

  nginx:
    image: nginx:alpine
    container_name: matlabx-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
    networks:
      - netlabx-network

volumes:
  mongodb_data:
    driver: local

networks:
  matlabx-network:
    driver: bridge
